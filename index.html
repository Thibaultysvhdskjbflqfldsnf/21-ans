<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire ❤️</title>
    <style>
        /* Importation de la police Calligraphie */
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Empêche les barres de défilement */
            background-color: #ffe5ec;
            position: relative;
        }

        /* Solution 1 : Fond flouté pour sceller esthétiquement le bas de la page */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('photos/1.jpeg'); /* Utilise ta première photo comme teinte de fond */
            background-size: cover;
            background-position: center;
            filter: blur(60px); /* Applique un flou artistique */
            opacity: 0.35; /* Rendu très doux et discret */
            z-index: -3; /* Placé tout au fond */
        }

        /* Mosaïque Adaptative à format VERTICAL 📸 */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* Largeur des colonnes */
            grid-template-rows: repeat(auto-fit, minmax(280px, 1fr));    /* 🆕 Hauteur verticale augmentée */
            gap: 4px; /* Un tout petit peu plus d'espace pour un effet cadre sympa */
            z-index: -2;
            overflow: hidden;
        }

        .bg-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Remplit la case verticale proprement */
            filter: none;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10; /* Au-dessus de la mosaïque */
        }

        /* Enveloppe épurée */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #f19cbb;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .envelope-wrapper:hover {
            transform: translateY(-5px);
        }

        /* Initiales avec cœur rouge */
        .initials {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Alex Brush', cursive;
            font-size: 38px;
            color: #e0ac69;
            z-index: 4;
            pointer-events: none;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            transition: opacity 0.3s ease-in-out;
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        .initials .heart {
            color: #ff4d6d;
            font-size: 28px;
            text-shadow: none;
        }

        /* Rabat de l'enveloppe */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid #e882a5;
            transform-origin: top;
            transition: transform 0.5s 0.3s, z-index 0.3s 0.3s;
            z-index: 3;
        }

        /* Quand l'enveloppe s'ouvre */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* Masquer les initiales lors de l'ouverture */
        .envelope-wrapper.open .initials {
            opacity: 0;
        }

        /* La Lettre (Cachée au début) */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 20px;
            width: 260px;
            height: 160px;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: all 0.8s ease-in-out;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
        }

        /* Image à l'intérieur de la lettre */
        .letter img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
            transition: object-fit 0.5s;
        }

        /* Animation de sortie de la lettre */
        .envelope-wrapper.open .letter {
            opacity: 1;
            transform: translateY(-150px) scale(1.1);
            z-index: 5;
        }

        /* Zoom final au premier plan */
        .envelope-wrapper.zoom .letter {
            width: 90vw;
            max-width: 500px;
            height: 80vh;
            max-height: 700px;
            transform: translateY(0) scale(1);
            position: fixed;
            top: 10vh;
            left: 50%;
            margin-left: -45vw;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            pointer-events: auto;
            z-index: 100;
        }

        @media (min-width: 550px) {
            .envelope-wrapper.zoom .letter {
                margin-left: -250px;
            }
        }

        .envelope-wrapper.zoom .letter img {
            object-fit: contain;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.2s;
            z-index: 10;
        }

        button:hover {
            background-color: #ff758f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="bg-grid" id="bgGrid"></div>

    <div class="container">
        <div class="envelope-wrapper" id="envelope" onclick="ouvrirLettre()">
            <div class="initials">K <span class="heart">❤️</span> T</div> 
            <div class="letter">
                <img src="ma-lettre.jpeg" alt="Lettre d'amour">
            </div>
        </div>
        <button id="btn" onclick="ouvrirLettre()">Abrir mi sorpresa</button>
    </div>

    <script>
        // Création d'une liste de 31 indices (1 à 31)
        let indices = [];
        for (let i = 1; i <= 31; i++) {
            indices.push(i);
        }

        // Fonction pour mélanger la liste (Algorithme de Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Mélange des indices avant de générer la grille
        shuffle(indices);

        // Génère automatiquement les 31 images en arrière-plan dans l'ordre mélangé
        const bgGrid = document.getElementById('bgGrid');
        for (let i = 0; i < indices.length; i++) {
            const indexPhoto = indices[i];
            const img = document.createElement('img');
            img.src = `photos/${indexPhoto}.jpeg`;
            img.onerror = function() {
                this.src = `photos/${indexPhoto}.jpg`;
            };
            bgGrid.appendChild(img);
        }

        function ouvrirLettre() {
            const envelope = document.getElementById('envelope');
            const btn = document.getElementById('btn');
            
            if (!envelope.classList.contains('open')) {
                envelope.classList.add('open');
                btn.style.display = 'none';
                
                setTimeout(() => {
                    envelope.classList.add('zoom');
                }, 1200);
            }
        }
    </script>

</body>
</html>
